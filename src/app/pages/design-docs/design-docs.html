<div class="min-h-screen bg-canvas text-text-primary flex flex-col">

  <!-- Header -->
  <div class="border-b border-border p-6">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <h1 class="text-3xl font-extrabold font-display tracking-tight text-text-primary uppercase">Design Docs</h1>
        <p class="text-text-muted mt-1 font-semibold text-xs tracking-wider uppercase">Architecture and flow diagrams</p>
      </div>
    </div>
  </div>

  <!-- Body: sidebar + viewer -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Doc list sidebar -->
    <aside class="w-64 shrink-0 border-r border-border bg-panel p-4 space-y-1 overflow-y-auto">
      @for (doc of docs; track doc.path) {
        <button
          type="button"
          (click)="selectDoc(doc)"
          class="w-full text-left rounded-lg px-4 py-3 transition-colors"
          [class.bg-canvas]="selectedDoc().path === doc.path"
          [class.text-text-primary]="selectedDoc().path === doc.path"
          [class.text-text-muted]="selectedDoc().path !== doc.path"
          [class.hover:bg-canvas]="selectedDoc().path !== doc.path"
          [class.hover:text-text-primary]="selectedDoc().path !== doc.path"
        >
          <p class="font-medium text-sm">{{ doc.label }}</p>
          <p class="text-xs text-text-muted mt-0.5">{{ doc.description }}</p>
        </button>
      }
    </aside>

    <!-- Iframe viewer -->
    <main class="flex-1 overflow-hidden">
      <iframe
        [src]="iframeSrc()"
        class="w-full h-full border-0"
        title="{{ selectedDoc().label }}"
      ></iframe>
    </main>

  </div>
</div>
