<div class="min-h-screen bg-zinc-950 text-zinc-100 p-6 md:p-12">
  <div class="max-w-4xl mx-auto space-y-8">
    
    <div class="flex items-center justify-between gap-4">
      <div class="flex items-center gap-4">
        <a routerLink="/standings" class="p-2 bg-zinc-900 hover:bg-zinc-800 rounded-lg text-zinc-400 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-white">Settings</h1>
          <p class="text-zinc-400 mt-1">Customize your experience</p>
        </div>
      </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-xl p-6">
      <h2 class="text-xl font-semibold text-white mb-6">Team Badge Style</h2>
      
      <p class="text-zinc-400 mb-6">Choose how team badges appear throughout the application.</p>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-zinc-300 mb-2">Badge Style</label>
          <select 
            #badgeStyleSelect
            [value]="selectedStyle()"
            (change)="setBadgeStyle(badgeStyleSelect.value)"
            class="w-full bg-zinc-950 border border-zinc-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors">
            @for (style of badgeStyles; track style) {
              <option [value]="style" class="capitalize">
                {{ style }}
              </option>
            }
          </select>
        </div>

        <div class="p-4 bg-zinc-950 rounded-xl border border-zinc-800">
          <h3 class="text-sm font-semibold text-zinc-300 mb-3">Preview</h3>
          <div class="flex items-center gap-4">
            <app-team-badge [teamId]="previewTeamId()" size="md"></app-team-badge>
            <div>
              <div class="text-sm text-zinc-400">Selected style: <span class="text-white font-medium capitalize">{{ selectedStyle() }}</span></div>
              <div class="text-xs text-zinc-500">Preview team: {{ previewTeamName() }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
