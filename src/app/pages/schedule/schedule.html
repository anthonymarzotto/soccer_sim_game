<div class="min-h-screen bg-zinc-950 text-zinc-100 p-6 md:p-12">
  <div class="max-w-4xl mx-auto space-y-8">
    
    <div class="flex items-center justify-between gap-4">
      <div class="flex items-center gap-4">
        <a routerLink="/standings" class="p-2 bg-zinc-900 hover:bg-zinc-800 rounded-lg text-zinc-400 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-white">Schedule</h1>
          <p class="text-zinc-400 mt-1">Match Results & Fixtures</p>
        </div>
      </div>
      
      <div></div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-xl p-6">
      <div class="flex items-center justify-between mb-8">
        <button 
          (click)="prevWeek()"
          [disabled]="selectedWeek() <= 1"
          class="p-2 rounded-lg bg-zinc-800 text-zinc-300 hover:bg-zinc-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 class="text-xl font-semibold text-white">Week {{ selectedWeek() }}</h2>
        <button 
          (click)="nextWeek()"
          [disabled]="selectedWeek() >= maxWeeks()"
          class="p-2 rounded-lg bg-zinc-800 text-zinc-300 hover:bg-zinc-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

      <div class="space-y-3">
        @for (match of matches(); track match.id) {
          <div class="flex flex-col p-4 rounded-xl bg-zinc-950 border border-zinc-800/50">
            <app-match-summary
              [match]="match"
              [showProbabilities]="!match.played"
              [showStats]="match.played"
              [showEvents]="match.played">
            </app-match-summary>

            @if (!match.played) {
              <div class="mt-3 flex justify-end gap-2">
                <button 
                  (click)="simulateMatch(match.id)"
                  [disabled]="gameService.isAnySimulationInProgress() || isSchemaMismatchBlocking()"
                  class="px-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-zinc-950 rounded-lg text-xs font-semibold transition-colors">
                  Simulate Game
                </button>
                <a 
                  [routerLink]="['/watch', match.id]"
                  [class.pointer-events-none]="gameService.isAnySimulationInProgress() || isSchemaMismatchBlocking()"
                  [class.opacity-50]="gameService.isAnySimulationInProgress() || isSchemaMismatchBlocking()"
                  class="px-3 py-1.5 bg-zinc-700 hover:bg-zinc-600 text-zinc-200 rounded-lg text-xs font-semibold transition-colors inline-flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                  Watch Game
                </a>
              </div>
            }
          </div>
        }
        @if (matches().length === 0) {
          <div class="text-center py-8 text-zinc-500">No matches found for this week.</div>
        }
      </div>
    </div>

  </div>
</div>
