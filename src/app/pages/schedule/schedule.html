<div class="min-h-screen bg-canvas text-text-primary p-6 md:p-12">
  <div class="max-w-4xl space-y-8">
    
    <div class="flex flex-col md:flex-row md:items-center justify-between border-b border-border pb-6 gap-4">
      <div>
        <h1 class="text-3xl font-extrabold font-display tracking-tight text-text-primary uppercase">Schedule</h1>
        <p class="text-text-muted mt-1 font-semibold text-xs tracking-wider uppercase">Match Results & Fixtures</p>
      </div>
    </div>

    <div class="bg-panel border border-border rounded-xl p-6">
      <div class="flex items-center justify-between mb-8">
        <button 
          (click)="prevWeek()"
          [disabled]="selectedWeek() <= 1"
          class="p-2 rounded-lg bg-canvas text-text-secondary hover:text-text-primary border border-border disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.96] transition-all cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 class="text-xl font-bold font-display text-text-primary uppercase">WEEK {{ selectedWeek() }}</h2>
        <button 
          (click)="nextWeek()"
          [disabled]="selectedWeek() >= maxWeeks()"
          class="p-2 rounded-lg bg-canvas text-text-secondary hover:text-text-primary border border-border disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.96] transition-all cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

      <div class="space-y-3">
        @for (match of matches(); track match.id) {
          <div [class]="'flex flex-col p-4 rounded-lg bg-canvas border ' + ((match.homeTeamId === userTeamId() || match.awayTeamId === userTeamId()) ? 'border-accent' : 'border-border')">
            <app-match-summary
              [match]="match"
              [showProbabilities]="!match.played"
              [showStats]="match.played"
              [showEvents]="match.played">
            </app-match-summary>

            @if (!match.played) {
              <div class="mt-3 flex justify-end gap-2">
                <button 
                  (click)="simulateMatch(match.id)"
                  [disabled]="gameService.isAnySimulationInProgress() || isSchemaMismatchBlocking()"
                  class="px-3 py-1.5 bg-accent text-canvas rounded-lg text-xs font-bold hover:opacity-90 disabled:opacity-50 active:scale-[0.96] transition-all cursor-pointer">
                  Simulate Game
                </button>
                <a 
                  [routerLink]="['/watch', match.id]"
                  [class.pointer-events-none]="gameService.isAnySimulationInProgress() || isSchemaMismatchBlocking()"
                  [class.opacity-50]="gameService.isAnySimulationInProgress() || isSchemaMismatchBlocking()"
                  class="px-3 py-1.5 bg-panel text-text-primary border border-border rounded-lg text-xs font-bold hover:bg-canvas active:scale-[0.96] transition-all inline-flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                  Watch Game
                </a>
              </div>
            }
          </div>
        }
        @if (matches().length === 0) {
          <div class="text-center py-8 text-text-muted font-semibold">No matches found for this week.</div>
        }
      </div>
    </div>

  </div>
</div>
