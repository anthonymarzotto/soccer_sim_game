<div class="space-y-2">
  @if (!gameService.isSeasonComplete() && !isReadOnlyMode()) {
    <div class="relative w-full">
      <div class="flex w-full rounded-lg overflow-hidden shadow-sm">
        <!-- Main Simulate Week Button -->
        <button
          type="button"
          (click)="simulateCurrentWeek()"
          [disabled]="gameService.isAnySimulationInProgress()"
          class="flex-1 bg-accent hover:bg-accent/90 disabled:opacity-50 disabled:cursor-not-allowed text-canvas font-semibold px-3 py-2 text-xs text-left cursor-pointer transition-colors"
        >
          Simulate Week {{ gameService.league()?.currentWeek }}
        </button>

        <!-- Dropdown Toggle Button -->
        <button
          type="button"
          (click)="toggleDropdown($event)"
          [disabled]="gameService.isAnySimulationInProgress()"
          class="border-l border-canvas/20 bg-accent hover:bg-accent/90 disabled:opacity-50 disabled:cursor-not-allowed text-canvas px-2 py-2 flex items-center justify-center cursor-pointer transition-colors"
          aria-haspopup="true"
          [attr.aria-expanded]="isDropdownOpen()"
        >
          <span class="material-icons text-base transition-transform duration-200" [class.rotate-180]="isDropdownOpen()">expand_more</span>
        </button>
      </div>

      <!-- Dropdown Menu -->
      @if (isDropdownOpen()) {
        <div class="absolute left-0 right-0 mt-1 z-50 rounded-lg bg-panel border border-border shadow-xl py-1 text-xs text-text-secondary">
          <button
            type="button"
            (click)="simulateWeeks(4)"
            class="w-full text-left px-3 py-2 hover:bg-canvas hover:text-text-primary transition-colors cursor-pointer flex items-center gap-2"
          >
            <span class="material-icons text-sm text-text-muted">calendar_today</span>
            <span>Simulate 4 Weeks</span>
          </button>

          <button
            type="button"
            (click)="simulateToWinterWindow()"
            [disabled]="isWinterWindowOptionDisabled()"
            class="w-full text-left px-3 py-2 flex items-center gap-2 transition-colors"
            [class.opacity-45]="isWinterWindowOptionDisabled()"
            [class.cursor-not-allowed]="isWinterWindowOptionDisabled()"
            [class.cursor-pointer]="!isWinterWindowOptionDisabled()"
            [class.hover:bg-canvas]="!isWinterWindowOptionDisabled()"
            [class.hover:text-text-primary]="!isWinterWindowOptionDisabled()"
          >
            <span class="material-icons text-sm" [class.text-text-muted]="!isWinterWindowOptionDisabled()" [class.text-text-muted/40]="isWinterWindowOptionDisabled()">ac_unit</span>
            <span>To Winter Window</span>
          </button>

          <button
            type="button"
            (click)="simulateWholeSeason()"
            class="w-full text-left px-3 py-2 hover:bg-canvas hover:text-text-primary transition-colors cursor-pointer flex items-center gap-2 border-t border-border/50"
          >
            <span class="material-icons text-sm text-text-muted">flag</span>
            <span>Full Season</span>
          </button>
        </div>
      }
    </div>
  }

  @if (gameService.isSeasonComplete() && !isReadOnlyMode()) {
    <button
      type="button"
      (click)="startNewSeason()"
      [disabled]="gameService.isAnySimulationInProgress()"
      class="w-full rounded-lg bg-accent px-3 py-2 text-xs font-semibold text-canvas transition-colors hover:bg-accent/90 disabled:cursor-not-allowed disabled:opacity-50 cursor-pointer"
    >
      Start New Season
    </button>
  }
</div>
